     Refactored: Vanilla CSS Shell + Premium Analytics
     ═══════════════════════════════════════ -->

<style>
    /* --- Report Specific Enhancements --- */
    .ranking-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }

    .ranking-item {
        display: flex;
        align-items: center;
        padding: 1rem;
        background: #FAFBFF;
        border: 1px solid var(--studio-border);
        border-radius: 12px;
        transition: all 0.2s ease;
    }

    .ranking-item:hover {
        transform: translateX(5px);
        border-color: var(--studio-indigo);
    }

    .rank-num {
        width: 24px;
        height: 24px;
        background: var(--studio-border);
        color: var(--studio-text-secondary);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        font-weight: 900;
        margin-right: 1rem;
    }

    .rank-num.active {
        background: var(--studio-indigo);
        color: #FFF;
        box-shadow: 0 4px 10px rgba(72, 52, 212, 0.3);
    }

    .analytics-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #F1F5F9;
        padding: 5px;
        border-radius: 12px;
    }

    .filter-btn {
        padding: 6px 14px;
        border-radius: 8px;
        font-size: 0.7rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
        background: transparent;
        color: var(--studio-text-secondary);
    }

    .filter-btn.active {
        background: #FFF;
        color: var(--studio-indigo);
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    }

    #monthSelect {
        padding: 5px 10px;
        border-radius: 8px;
        font-size: 0.7rem;
        font-weight: 700;
        border: 1px solid var(--studio-border);
        background: #FFF;
        color: var(--studio-text-primary);
        cursor: pointer;
        display: none;
    }
</style>

<div class="summary-grid">
    <div class="summary-card">
        <span class="card-label">Global Revenue</span>
        <div class="card-value" id="disp-total-rev">₹0</div>
        <div class="card-trend trend-up"><i class="fas fa-chart-line"></i> Lifetime Yield</div>
    </div>
    <div class="summary-card">
        <span class="card-label">Total Sessions</span>
        <div class="card-value" id="disp-total-appts">0</div>
        <div class="card-trend trend-up"><i class="fas fa-calendar-check"></i> Processed</div>
    </div>
    <div class="summary-card">
        <span class="card-label">Top Performer</span>
        <div class="card-value" style="font-size: 1.1rem; margin: 5px 0;" id="disp-top-artist">Artist</div>
        <div class="card-trend trend-up" style="color: var(--studio-indigo);" id="disp-top-stat">0 Sessions</div>
    </div>
</div>

<div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; margin-top: 2rem;">

    <!-- Main Revenue Analytics -->
    <div class="studio-card">
        <div
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
            <div>
                <h3 class="studio-title" style="margin: 0;">Financial Performance</h3>
                <p
                    style="color: var(--studio-text-secondary); font-size: 0.75rem; font-weight: 700; text-transform: uppercase;">
                    Revenue Flow Control</p>
            </div>

            <div style="display: flex; align-items: center; gap: 10px;">
                <select id="monthSelect" onchange="dispatchAction('SET_MONTH', this.value)"></select>
                <div class="analytics-toolbar">
                    <button id="btn-week" class="filter-btn"
                        onclick="dispatchAction('SET_VIEW', 'weekly')">Week</button>
                    <button id="btn-month" class="filter-btn"
                        onclick="dispatchAction('SET_VIEW', 'monthly')">Month</button>
                    <button id="btn-year" class="filter-btn"
                        onclick="dispatchAction('SET_VIEW', 'yearly')">Year</button>
                </div>
            </div>
        </div>

        <div style="height: 350px; position: relative;">
            <canvas id="revenueChartCanvas"></canvas>
        </div>
    </div>

    <!-- Artist Distribution -->
    <div class="studio-card">
        <h3 class="studio-title" style="margin-bottom: 0.5rem;">Artist Benchmarks</h3>
        <p
            style="color: var(--studio-text-secondary); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 1.5rem;">
            Performance Distribution</p>

        <div style="height: 250px; margin-bottom: 2rem;">
            <canvas id="artistChartCanvas"></canvas>
        </div>

        <div class="ranking-list" id="artistRankingList">
            <!-- Populated by JS -->
        </div>
    </div>
</div>

<!-- ════════════ ANALYTICS STATE ENGINE ════════════ -->
<script id="reports-raw-data" type="application/json">
{{ {
    "daily_revenue": (daily_revenue or []),
    "total_revenue": (total_revenue | default(0)),
    "total_appointments": (total_appointments | default(0)),
    "artist_performance": (artist_performance or [])
} | tojson | safe }}
</script>

<script>
    (function () {
        const rawDataElement = document.getElementById('reports-raw-data');
        if (!rawDataElement) return;

        const raw = JSON.parse(rawDataElement.textContent);

        let state = {
            view: 'monthly',
            selectedMonth: '', // YYYY-MM
            revenueChart: null,
            artistChart: null
        };

        // --- Data Aggregation Logic ---
        function getRevenueData(view, selectedMonth) {
            const dataMap = {};
            raw.daily_revenue.forEach(d => { dataMap[d.date_key] = parseFloat(d.total_revenue) || 0; });

            const today = new Date();
            let results = [];

            if (view === 'weekly') {
                for (let i = 6; i >= 0; i--) {
                    const d = new Date();
                    d.setDate(today.getDate() - i);
                    const key = d.toISOString().split('T')[0];
                    results.push({ label: d.toLocaleString('en-US', { weekday: 'short' }), val: dataMap[key] || 0 });
                }
            } else if (view === 'monthly') {
                const target = selectedMonth || today.toISOString().substring(0, 7);
                const [y, m] = target.split('-').map(Number);
                const days = new Date(y, m, 0).getDate();
                for (let i = 1; i <= days; i++) {
                    const key = `${y}-${String(m).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    results.push({ label: `${new Date(y, m - 1, 1).toLocaleString('en-US', { month: 'short' })} ${i}`, val: dataMap[key] || 0 });
                }
            } else {
                const monthlySum = {};
                raw.daily_revenue.forEach(d => {
                    const mk = d.date_key.substring(0, 7);
                    if (!monthlySum[mk]) monthlySum[mk] = { label: new Date(d.date_key).toLocaleString('en-US', { month: 'short', year: '2-digit' }), val: 0 };
                    monthlySum[mk].val += parseFloat(d.total_revenue) || 0;
                });
                results = Object.values(monthlySum);
            }

            return { labels: results.map(r => r.label), values: results.map(r => r.val) };
        }

        // --- State Dispatcher ---
        window.dispatchAction = function (type, payload) {
            if (type === 'SET_VIEW') state.view = payload;
            if (type === 'SET_MONTH') { state.selectedMonth = payload; state.view = 'monthly'; }
            useEffect();
        };

        // --- Side Effects & UI Sync ---
        function useEffect() {
            // Sync Buttons
            document.getElementById('btn-week').classList.toggle('active', state.view === 'weekly');
            document.getElementById('btn-month').classList.toggle('active', state.view === 'monthly');
            document.getElementById('btn-year').classList.toggle('active', state.view === 'yearly');

            // Sync Select
            const mSelect = document.getElementById('monthSelect');
            mSelect.style.display = (state.view === 'monthly') ? 'block' : 'none';
            if (state.view === 'monthly' && !mSelect.options.length) populateMonths();

            // Update Summary Row
            document.getElementById('disp-total-rev').textContent = `₹${raw.total_revenue.toLocaleString('en-IN')}`;
            document.getElementById('disp-total-appts').textContent = raw.total_appointments;

            renderCharts();
            updateRankings();
        }

        function populateMonths() {
            const select = document.getElementById('monthSelect');
            const months = [...new Set(raw.daily_revenue.map(d => d.date_key.substring(0, 7)))];
            if (!months.includes(new Date().toISOString().substring(0, 7))) months.push(new Date().toISOString().substring(0, 7));

            const sorted = months.sort().reverse();
            select.innerHTML = sorted.map(m => {
                const [y, mm] = m.split('-');
                const label = new Date(y, mm - 1).toLocaleString('en-US', { month: 'long', year: 'numeric' });
                return `<option value="${m}" ${m === state.selectedMonth ? 'selected' : ''}>${label}</option>`;
            }).join('');

            if (!state.selectedMonth) state.selectedMonth = sorted[0];
        }

        function renderCharts() {
            // 1. Revenue Chart
            const revCtx = document.getElementById('revenueChartCanvas').getContext('2d');
            const revData = getRevenueData(state.view, state.selectedMonth);
            if (state.revenueChart) state.revenueChart.destroy();
            state.revenueChart = new Chart(revCtx, {
                type: 'bar',
                data: {
                    labels: revData.labels,
                    datasets: [{
                        data: revData.values,
                        backgroundColor: '#4834D4',
                        borderRadius: 8,
                        maxBarThickness: 32
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, border: { display: false }, ticks: { font: { weight: 600 }, color: '#94A3B8' } },
                        y: { border: { display: false }, grid: { color: '#F1F5F9' }, ticks: { callback: v => '₹' + (v >= 1000 ? v / 1000 + 'k' : v) } }
                    }
                }
            });

            // 2. Artist Distribution Chart
            const artCtx = document.getElementById('artistChartCanvas').getContext('2d');
            const sorted = [...raw.artist_performance].sort((a, b) => (b.done_appts || 0) - (a.done_appts || 0));
            if (state.artistChart) state.artistChart.destroy();
            state.artistChart = new Chart(artCtx, {
                type: 'doughnut',
                data: {
                    labels: sorted.map(a => a.artist_name),
                    datasets: [{
                        data: sorted.map(a => a.done_appts),
                        backgroundColor: ['#4834D4', '#22C55E', '#F59E0B', '#3B82F6', '#EF4444'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { usePointStyle: true, padding: 15, font: { size: 10, weight: 700 } } }
                    },
                    cutout: '70%'
                }
            });
        }

        function updateRankings() {
            const list = document.getElementById('artistRankingList');
            const sorted = [...raw.artist_performance].sort((a, b) => (b.total_revenue || 0) - (a.total_revenue || 0));

            if (sorted.length > 0) {
                document.getElementById('disp-top-artist').textContent = sorted[0].artist_name;
                document.getElementById('disp-top-stat').textContent = `${sorted[0].done_appts} Sessions Met`;
            }

            list.innerHTML = sorted.map((a, i) => `
            <div class="ranking-item">
                <div class="rank-num ${i === 0 ? 'active' : ''}">${i + 1}</div>
                <div style="flex: 1;">
                    <div style="font-weight: 800; color: var(--studio-text-primary); font-size: 0.85rem;">${a.artist_name}</div>
                    <div style="font-size: 0.65rem; color: var(--studio-text-secondary); font-weight: 700; text-transform: uppercase;">${a.specialisation || 'Resident Artist'}</div>
                </div>
                <div style="text-align: right;">
                    <div style="font-weight: 900; color: var(--studio-indigo); font-size: 0.85rem;">₹${(a.total_revenue || 0).toLocaleString()}</div>
                    <div style="font-size: 0.6rem; color: #22c55e; font-weight: 800;">${a.done_appts} Done</div>
                </div>
            </div>
        `).join('');
        }

        // --- Init ---
        useEffect();
    })();
</script>
