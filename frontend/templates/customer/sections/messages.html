<!-- SECTION: MESSAGES -->
<div class="msg-shell">

  <!-- Thread Sidebar -->
  <div class="msg-thread-col">
    <div class="msg-thread-header">
      <i class="fas fa-inbox"></i>
      <h3>Inbox</h3>
      <span id="cust-inbox-badge" class="inbox-badge" hidden></span>
    </div>
    <div class="msg-thread-list" id="cust-thread-list">
      <div class="msg-loading"><i class="fas fa-circle-notch fa-spin"></i> Loading…</div>
    </div>
  </div>

  <!-- Chat Pane -->
  <div class="msg-chat-pane">

    <!-- Empty state -->
    <div id="cust-chat-empty" class="msg-chat-empty">
      <i class="fas fa-comments empty-icon-lg"></i>
      <h2>Your Conversations</h2>
      <p>Select an artist thread to start chatting</p>
    </div>

    <!-- Active thread -->
    <div id="cust-chat-active" class="msg-active msg-active-hidden">

      <!-- Header -->
      <div class="msg-chat-header">
        <div class="msg-chat-header-left">
          <div class="msg-chat-av" id="cust-chat-av">A</div>
          <div>
            <div class="msg-chat-name" id="cust-chat-name">—</div>
            <div class="msg-online-indicator">
              <span class="msg-online-dot"></span> Online
            </div>
          </div>
        </div>
        <button class="msg-header-btn" onclick="custShowArtistInfo()" title="Info">
          <i class="fas fa-ellipsis-v"></i>
        </button>
      </div>

      <!-- Messages -->
      <div class="msg-area" id="cust-msgs-area"></div>

      <!-- Multi-select bar -->
      <div id="cust-sel-bar" class="msg-sel-bar" hidden>
        <span id="cust-sel-count" class="msg-sel-count">0 selected</span>
        <div class="msg-sel-actions">
          <button onclick="custCancelSelection()" class="btn-sel-cancel">Cancel</button>
          <button onclick="custDeleteSelected()" class="btn-sel-delete">
            <i class="fas fa-trash-alt"></i> Delete
          </button>
        </div>
      </div>

      <!-- Input -->
      <div class="msg-input-area">
        <div class="msg-input-row">
          <div class="msg-input-wrap">
            <textarea id="cust-chat-input" placeholder="Type your message…" rows="1"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();custSend();}"
              oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
            <button class="msg-attach-btn" title="Attach"><i class="fas fa-paperclip"></i></button>
          </div>
          <button id="cust-send-btn" class="msg-send-btn" onclick="custSend()">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Artist Info Modal -->
<div id="artist-info-modal" class="msg-info-modal" onclick="if(event.target===this)custHideArtistInfo()">
  <div class="info-modal-card">
    <div class="info-modal-av" id="m-artist-av">A</div>
    <h3 class="info-modal-name" id="m-artist-name">Artist</h3>
    <p class="info-modal-label">About</p>
    <p class="info-modal-bio" id="m-artist-bio">Loading…</p>
    <p class="info-modal-label">Specialties</p>
    <p class="info-modal-bio" id="m-artist-styles">—</p>
    <button class="info-modal-close" onclick="custHideArtistInfo()">Close</button>
  </div>
</div>
