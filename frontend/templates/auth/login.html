<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Tattoos | Login</title>
    <!-- Global tokens + theme engine -->
    <link rel="stylesheet" href="{{ url_for('static', filename='font-awesome/css/all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/core/fonts.css') }}">
    <!-- Global design tokens (noir/ivory variables + body ambient) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/core/main_design.css') }}">
    <!-- Theme engine: runs before body paint to prevent flicker -->
    <script src="{{ url_for('static', filename='js/core/theme.js') }}"></script>

    <style>
/* ── LOGIN-SPECIFIC STYLES ── */
/* Inherits core variables from main_design.css */

.auth-page {
    background: var(--studio-bg);
    color: var(--studio-text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    padding-top: 5rem;
}

.auth-nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 200;
    height: 60px;
    background: var(--studio-sidebar);
    backdrop-filter: var(--studio-blur);
    border-bottom: 1px solid var(--studio-border);
    display: flex;
    align-items: center;
}

.auth-nav-container {
    max-width: 72rem;
    margin: 0 auto;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
}

.brand-link {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    text-decoration: none;
}

.brand-logo {
    width: 2rem;
    height: 2rem;
    border-radius: 50%;
    object-fit: cover;
}

.brand-text {
    font-family: var(--font-tech);
    color: #f5f5f7;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 700;
}

.btn-home-back {
    padding: 0.4rem 1.1rem;
    font-size: 0.72rem;
    font-weight: 700;
    background: var(--studio-gold);
    color: #000;
    border-radius: 20px;
    text-decoration: none;
    transition: background 0.2s;
}

.btn-home-back:hover {
    background: var(--studio-selection);
}

/* Auth Card */
.auth-card {
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
}

.auth-header {
    padding: 2.25rem 2.5rem 1.5rem;
    text-align: center;
    border-bottom: 1px solid var(--studio-border);
    background: linear-gradient(180deg, rgba(200, 160, 64, 0.05) 0%, transparent 100%);
}

.header-logo-circle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 4.75rem;
    height: 4.75rem;
    border-radius: 50%;
    margin-bottom: 1rem;
    overflow: hidden;
    border: 2px solid var(--studio-gold-dim);
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    background: var(--studio-surface);
}

.header-logo-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.title-grad {
    font-family: var(--font-tech);
    background: var(--studio-grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
}

.header-subtitle {
    color: var(--studio-text-secondary);
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin: 0.3rem 0 0;
}

.flash-container {
    padding: 0.75rem 1.5rem 0;
}

.auth-content {
    padding: 2rem 2.5rem 2.5rem;
}

.role-selector-wrap {
    margin-bottom: 1.25rem;
}

.selector-label {
    display: block;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--studio-text-muted);
    margin-bottom: 0.6rem;
    letter-spacing: 0.10em;
    text-transform: uppercase;
}

.role-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.6rem;
}

.role-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 1rem 0.5rem;
    border: 1px solid var(--studio-border);
    border-radius: var(--studio-radius-sm);
    background: var(--studio-card-inner-bg);
    color: var(--studio-text-muted);
    cursor: pointer;
    transition: all 0.22s ease;
}

.role-card:hover {
    border-color: var(--studio-gold-dim);
    color: var(--studio-text-secondary);
}

.role-card.active {
    border-color: var(--studio-gold);
    color: var(--studio-text-primary);
    background: var(--studio-gold-soft);
    box-shadow: 0 4px 12px var(--studio-gold-dim);
}

.role-card.pop {
    animation: rolePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes rolePop {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

.role-card i {
    font-size: 1.15rem;
    margin-bottom: 0.3rem;
}

.role-card span {
    font-size: 0.63rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

.reg-prompt {
    display: none;
    margin-top: 0.75rem;
    padding: 0.65rem 1rem;
    background: var(--studio-gold-soft);
    border: 1px solid var(--studio-gold-dim);
    border-radius: 0.75rem;
    text-align: center;
}

.reg-prompt p {
    font-size: 0.75rem;
    color: var(--studio-text-secondary);
    margin: 0;
}

.reg-prompt a {
    color: var(--studio-gold);
    font-weight: 700;
    text-decoration: none;
}

.reg-prompt.show {
    display: block;
}

.form-section {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    transition: opacity 0.3s ease, transform 0.3s ease;
}

.slide-out {
    opacity: 0;
    transform: translateX(-10px);
}

.slide-in {
    opacity: 0;
    transform: translateX(10px);
    animation: slideIn 0.35s forwards;
}

@keyframes slideIn {
    to { opacity: 1; transform: translateX(0); }
}

.input-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
}

.input-label {
    display: block;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--studio-text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

.field {
    width: 100%;
    padding: 0.8rem 1rem;
    background: var(--studio-input-bg);
    border: 1px solid var(--studio-border);
    border-radius: var(--studio-radius-sm);
    color: var(--studio-text-primary);
    font-size: 0.92rem;
    outline: none;
    transition: all 0.22s ease;
}

.field:focus {
    border-color: var(--studio-selection);
    background: var(--studio-card-inner-bg);
    box-shadow: 0 0 0 4px var(--studio-selection-soft);
}

.password-wrap {
    position: relative;
}

.toggle-eye {
    position: absolute;
    right: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--studio-text-muted);
    padding: 0;
}

.forgot-pass-wrap {
    text-align: right;
    margin-top: -0.25rem;
}

.forgot-pass-wrap a {
    font-size: 0.72rem;
    color: var(--studio-text-muted);
    text-decoration: none;
}

.auth-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
}

.btn-gold {
    flex: 1;
    padding: 0.8rem;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none;
    border-radius: var(--studio-radius-sm);
    background: var(--studio-grad);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 12px var(--studio-selection-soft);
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.btn-gold:not(:disabled):hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px var(--studio-selection-soft);
}

.btn-gold:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    filter: grayscale(1);
    transform: none;
}

.btn-outline {
    padding: 0.8rem 1.75rem;
    border: 1px solid var(--studio-border);
    border-radius: var(--studio-radius-sm);
    background: transparent;
    color: var(--studio-text-secondary);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.22s ease;
}

.btn-outline:hover {
    border-color: var(--studio-gold);
    color: var(--studio-gold);
    background: var(--studio-gold-soft);
}

.card-wrap {
    position: relative;
    border-radius: var(--studio-radius);
    padding: 1px;
    background: var(--studio-border);
    box-shadow: var(--studio-shadow);
}

.card-body {
    background: var(--studio-surface);
    border-radius: calc(var(--studio-radius) - 1px);
    overflow: hidden;
}

.sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border-width: 0;
}

.flash-error {
    padding: 0.65rem 1rem;
    border-radius: 0.75rem;
    font-size: 0.8rem;
    margin-bottom: 0.75rem;
    border: 1px solid var(--studio-danger-dim);
    background: var(--studio-danger-soft);
    color: #fca5a5;
}

.flash-success {
    padding: 0.65rem 1rem;
    border-radius: 0.75rem;
    font-size: 0.8rem;
    margin-bottom: 0.75rem;
    border: 1px solid var(--studio-gold-dim);
    background: var(--studio-gold-soft);
    color: var(--studio-gold);
}
    </style>
</head>

<body class="auth-page">

    <!-- Top Bar -->
    <nav class="auth-nav">
        <div class="auth-nav-container">
            <a href="/" class="brand-link">
                <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Logo" class="brand-logo"
                    loading="lazy" decoding="async">
                <span class="brand-text">Dragon Tattoos</span>
            </a>
            <div style="display:flex;align-items:center;gap:0.625rem;">
                <button id="globalThemeBtn" onclick="toggleTheme()" title="Toggle theme"
                    style="display:inline-flex;align-items:center;justify-content:center;width:2rem;height:2rem;border-radius:50%;background:transparent;border:1.5px solid var(--studio-border);color:var(--studio-text-muted);font-size:0.8rem;cursor:pointer;transition:all 0.2s;">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
                <a href="/" class="btn-home-back">← Home</a>
            </div>
        </div>
    </nav>

    <!-- Login Card -->
    <div class="auth-card">
        <div class="card-wrap">
            <div class="card-body">
                <!-- Header -->
                <div class="auth-header">
                    <div class="header-logo-circle">
                        <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Logo"
                            loading="lazy" decoding="async">
                    </div>
                    <h1 class="title-grad">Dragon Tattoos</h1>
                    <p class="header-subtitle">Studio Management System</p>
                </div>

                <!-- Flash Messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                <div class="flash-container">
                    {% for category, message in messages %}
                    <div class="{{ 'flash-error' if category == 'error' else 'flash-success' }}">
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}
                {% endwith %}

                <!-- Form Content -->
                <div class="auth-content">
                    <form id="loginForm" method="POST" action="/login" autocomplete="off">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <!-- Role Selector -->
                        <div class="role-selector-wrap">
                            <label class="selector-label">Select Your Role</label>
                            <div class="role-grid">
                                <div>
                                    <input type="radio" name="role" id="r-cust" value="customer" class="sr-only" required onchange="handleRole(this)">
                                    <label for="r-cust" class="role-card" id="lbl-cust">
                                        <i class="fa-regular fa-user"></i>
                                        <span>Customer</span>
                                    </label>
                                </div>
                                <div>
                                    <input type="radio" name="role" id="r-art" value="artist" class="sr-only" onchange="handleRole(this)">
                                    <label for="r-art" class="role-card" id="lbl-art">
                                        <i class="fa-solid fa-pen-nib"></i>
                                        <span>Artist</span>
                                    </label>
                                </div>
                                <div>
                                    <input type="radio" name="role" id="r-own" value="owner" class="sr-only" onchange="handleRole(this)">
                                    <label for="r-own" class="role-card" id="lbl-own">
                                        <i class="fa-solid fa-crown"></i>
                                        <span>Owner</span>
                                    </label>
                                </div>
                            </div>

                            <!-- Register prompt (customer only) -->
                            <div class="reg-prompt" id="registerPrompt">
                                <p>New here? <a href="/register">Create a customer account</a></p>
                            </div>
                        </div>

                        <!-- Form Fields Section -->
                        <div id="formSection" class="form-section">
                            <div class="input-group">
                                <label for="username" class="input-label">Email / ID</label>
                                <input type="email" id="username" name="email" class="field" placeholder="Enter email address" required oninput="validate()" autocomplete="username">
                            </div>

                            <div class="input-group">
                                <label for="password" class="input-label">Password</label>
                                <div class="password-wrap">
                                    <input type="password" id="password" name="password" class="field" placeholder="Enter password" required oninput="validate()" autocomplete="current-password">
                                    <button type="button" class="toggle-eye" onclick="toggleEye()">
                                        <i class="fa-regular fa-eye" id="eyeIcon"></i>
                                    </button>
                                </div>
                                <div class="forgot-pass-wrap" id="forgotPasswordContainer" style="display:none;">
                                    <a href="/forgot-password">Forgot password?</a>
                                </div>
                            </div>

                            <div class="auth-actions">
                                <button type="submit" id="submitBtn" class="btn-gold" disabled>Login</button>
                                <button type="button" class="btn-outline" onclick="resetForm()">Reset</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
const labelMap = { customer: 'lbl-cust', artist: 'lbl-art', owner: 'lbl-own' };
let isAnimating = false;
let eyeVisible = false;

function handleRole(input) {
    if (isAnimating) return;
    isAnimating = true;
    Object.values(labelMap).forEach(id => {
        document.getElementById(id).classList.remove('active', 'pop');
    });
    const lbl = document.getElementById(labelMap[input.value]);
    lbl.classList.add('active');
    void lbl.offsetWidth;
    lbl.classList.add('pop');
    const sec = document.getElementById('formSection');
    sec.classList.remove('slide-in');
    sec.classList.add('slide-out');
    setTimeout(() => {
        const u = document.getElementById('username');
        if (input.value === 'artist') {
            u.placeholder = 'Artist ID (e.g. DRAG-ART-001)';
            u.name = 'artist_id';
            u.type = 'text';
            u.required = true;
        } else if (input.value === 'owner') {
            u.placeholder = 'Owner Email / ID';
            u.name = 'email';
            u.type = 'text';
            u.required = true;
        } else {
            u.placeholder = 'Email address';
            u.name = 'email';
            u.type = 'email';
            u.required = true;
        }
        u.value = '';
        document.getElementById('password').value = '';
        resetEye();
        const prompt = document.getElementById('registerPrompt');
        const forgotContainer = document.getElementById('forgotPasswordContainer');
        if (input.value === 'customer') {
            prompt.classList.add('show');
            forgotContainer.style.display = 'block';
        } else {
            prompt.classList.remove('show');
            forgotContainer.style.display = 'none';
        }
        sec.classList.remove('slide-out');
        sec.classList.add('slide-in');
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                sec.classList.remove('slide-in');
            });
        });
        isAnimating = false;
        validate();
    }, 350);
}

function toggleEye() {
    const p = document.getElementById('password');
    const i = document.getElementById('eyeIcon');
    eyeVisible = !eyeVisible;
    p.type = eyeVisible ? 'text' : 'password';
    i.className = eyeVisible ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
}

function resetEye() {
    eyeVisible = false;
    document.getElementById('password').type = 'password';
    document.getElementById('eyeIcon').className = 'fa-regular fa-eye';
}

function validate() {
    const u = document.getElementById('username').value.trim();
    const pw = document.getElementById('password').value;
    const role = document.querySelector('input[name="role"]:checked');
    document.getElementById('submitBtn').disabled = !(u.length >= 1 && pw.length >= 6 && !!role);
}

function resetForm() {
    document.getElementById('loginForm').reset();
    Object.values(labelMap).forEach(id => {
        document.getElementById(id).classList.remove('active', 'pop');
    });
    document.getElementById('registerPrompt').classList.remove('show');
    document.getElementById('forgotPasswordContainer').style.display = 'none';
    const u = document.getElementById('username');
    u.placeholder = 'Email address';
    u.name = 'email';
    u.type = 'email';
    resetEye();
    validate();
}

// ── Theme icon sync ──
function syncThemeIcon() {
    const theme = document.documentElement.getAttribute('data-theme') || 'ivory';
    const icon = document.getElementById('themeIcon');
    if (icon) icon.className = theme === 'noir' ? 'fas fa-sun' : 'fas fa-moon';
}
syncThemeIcon();
window.addEventListener('themeChanged', syncThemeIcon);
    </script>
</body>

</html>
