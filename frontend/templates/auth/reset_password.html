<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Tattoos | Reset Password</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}">

    <!-- Unified Design System -->
    <link rel="stylesheet" href="{{ url_for('static', filename='font-awesome/css/all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/core/fonts.css') }}">
    <!-- Tailwind Output (Local Build) -->
    <!-- Optimized Vanilla Design System -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/core/utilities.css') }}?v=2.1">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/core/tailwind_vanilla.css') }}?v=2.1">

    <!-- Legacy CSS (Will be removed after verification) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/core/main_design.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/core/utilities.css') }}">

    <script src="{{ url_for('static', filename='js/core/theme.js') }}"></script>

    <!-- Local Assets -->
    <link rel="stylesheet" href="{{ url_for('static', filename='font-awesome/css/all.min.css') }}">
</head>

<body class="bg-studio-bg min-h-screen flex flex-col items-center justify-center p-6 pt-20">

    <nav
        class="fixed top-0 inset-x-0 h-[70px] bg-studio-surface/80 backdrop-blur-md border-b border-studio-border z-[200] flex items-center">
        <div class="max-w-6xl mx-auto w-full flex items-center justify-between px-6">
            <a href="/" class="flex items-center gap-2 group">
                <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Logo"
                    class="w-8 h-8 rounded-full object-cover border border-studio-border group-hover:border-studio-gold transition-colors">
                <span id="navBrand"
                    class="font-display text-text text-[10px] tracking-[0.2em] uppercase font-bold opacity-80 group-hover:opacity-100 transition-opacity">Dragon
                    Tattoos</span>
            </a>
            <a href="/"
                class="text-accent text-[11px] font-bold tracking-widest uppercase hover:opacity-70 transition-opacity flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Home
            </a>
        </div>
    </nav>

    <div class="auth-card max-w-[480px]">
        <div class="card-body">
            <div id="cardHeader" class="text-center mb-8 reveal">
                <div id="logoCircle"
                    class="w-20 h-20 rounded-full border-2 border-studio-gold/20 p-1 mx-auto mb-4 bg-studio-surface shadow-xl flex items-center justify-center overflow-hidden">
                    <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Logo"
                        class="w-full h-full object-cover">
                </div>
                <h1 class="font-display text-3xl gold-text tracking-tighter">SECURITY</h1>
                <p id="cardSubtitle" class="text-muted text-[10px] tracking-[0.3em] uppercase mt-1 opacity-60">Create
                    New Password</p>
            </div>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="px-6 mb-4">
                {% for category, message in messages %}
                <div
                    class="p-3 rounded-xl text-center text-[11px] font-bold uppercase tracking-widest {{ 'bg-red-500/10 text-red-500 border border-red-500/20' if category == 'error' else 'bg-studio-gold/10 text-studio-gold border border-studio-gold/20' }}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <!-- Content -->
            <div class="px-8 pb-8">
                <p class="text-center text-[10px] text-muted font-bold uppercase tracking-widest mb-10 opacity-60">
                    OTP Verified! Set your new password below.
                </p>

                <form id="resetForm" method="POST" action="/reset-password" autocomplete="off">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-muted text-[10px] font-bold uppercase tracking-widest ml-1">
                                <i class="fa-solid fa-lock mr-1"></i> New Password
                            </label>
                            <div class="relative">
                                <input type="password" id="password" name="password" class="contact-input !mb-0 pr-12"
                                    placeholder="Min 8 characters" required oninput="checkStrength(); validate()">
                                <button type="button" onclick="togglePass('password','eyePass')"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-muted hover:text-text transition-colors">
                                    <i class="fa-regular fa-eye" id="eyePass"></i>
                                </button>
                            </div>
                            <div class="w-full h-1 bg-studio-border rounded-full mt-2 overflow-hidden">
                                <div class="h-full bg-studio-gold transition-all duration-500 w-0" id="strengthBar">
                                </div>
                            </div>
                            <p id="strengthLabel" class="text-[9px] font-bold uppercase tracking-widest mt-1 ml-1"></p>
                        </div>

                        <div class="space-y-2">
                            <label class="text-muted text-[10px] font-bold uppercase tracking-widest ml-1">
                                <i class="fa-solid fa-lock mr-1"></i> Confirm New Password
                            </label>
                            <div class="relative">
                                <input type="password" id="confirm_password" name="confirm_password"
                                    class="contact-input !mb-0 pr-12" placeholder="Re-enter your password" required
                                    oninput="validate()">
                                <button type="button" onclick="togglePass('confirm_password','eyeConf')"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-muted hover:text-text transition-colors">
                                    <i class="fa-regular fa-eye" id="eyeConf"></i>
                                </button>
                            </div>
                            <p id="matchHint" class="text-[10px] font-bold mt-2 ml-1 hidden"></p>
                        </div>

                        <button type="submit" id="submitBtn" class="btn-gold w-full mt-4 opacity-50 cursor-not-allowed"
                            disabled>
                            RESET PASSWORD <i class="fa-solid fa-check-circle text-[10px] ml-1"></i>
                        </button>

                        <div class="text-center">
                            <a href="/login" class="text-accent text-[11px] font-bold hover:opacity-70 transition-all">
                                ← Cancel & Return
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function validate() {
            const pw = document.getElementById('password').value;
            const cpw = document.getElementById('confirm_password').value;
            const hint = document.getElementById('matchHint');

            const match = pw === cpw && pw.length > 0;
            hint.classList.remove('hidden');
            hint.textContent = match ? '✓ Passwords match' : '✗ Passwords do not match';
            hint.style.color = match ? 'var(--studio-gold)' : '#ef4444';

            const btn = document.getElementById('submitBtn');
            btn.disabled = !match || pw.length < 8;
            if (btn.disabled) {
                btn.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        function checkStrength() {
            const pw = document.getElementById('password').value;
            const bar = document.getElementById('strengthBar');
            const lbl = document.getElementById('strengthLabel');

            const len = pw.length >= 8;
            const upp = /[A-Z]/.test(pw);
            const num = /[0-9]/.test(pw);
            const spe = /[^A-Za-z0-9]/.test(pw);

            let score = [len, upp, num, spe].filter(Boolean).length;
            bar.style.width = (score * 25) + '%';

            if (score === 0) {
                bar.style.background = 'var(--studio-border)';
                lbl.textContent = '';
            } else if (score === 1) {
                bar.style.background = 'var(--studio-danger)';
                lbl.textContent = 'Weak';
            } else if (score === 2) {
                bar.style.background = '#fbbf24'; // Fair (Amber)
                lbl.textContent = 'Fair';
            } else if (score === 3) {
                bar.style.background = 'var(--studio-selection)';
                lbl.textContent = 'Good';
            } else {
                bar.style.background = 'var(--studio-success)';
                lbl.textContent = 'Strong';
            }
        }

        function togglePass(id, eyeId) {
            const el = document.getElementById(id);
            const eye = document.getElementById(eyeId);
            if (el.type === 'password') {
                el.type = 'text';
                eye.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                el.type = 'password';
                eye.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>

</html>
